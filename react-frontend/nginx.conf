server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large PDF responses (PDFs are up to 50MB)
    client_max_body_size 100m;
    proxy_max_temp_file_size 0;

    # Proxy ALL /api/ requests to FastAPI backend (must come before SPA fallback)
    location ^~ /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;                    # Required for SSE / chunked transfer
        proxy_set_header Connection '';             # Keep connection open for SSE
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_buffering off;                        # Critical: disable buffering for SSE + large files
        proxy_cache off;
        chunked_transfer_encoding on;

        # Allow PDFs to be shown in iframes on the same origin
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Content-Security-Policy "frame-ancestors 'self'";
    }

    # SPA fallback — only runs if no /api/ prefix matched
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
}
