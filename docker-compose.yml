version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: census_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/workspace-app/data:ro
      - ./workspace:/workspace-app/workspace
      - ./app:/workspace-app/app
      - ./tests:/workspace-app/tests
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: census_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
